name: angular-ci

on:
  push:
    branches:
      - develop
      - main
      - cicd
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.18.1'
      - name: Install dependencies
        run: npm install
      - name: Install Angular CLI
        run: npm install -g @angular/cli
      - name: Build application
        run: ng build

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.18.1'
      - name: Install Angular CLI
        run: npm install -g @angular/cli
      - name: Install dependencies
        run: npm install karma
      # - name: Run tests
      #   run: npm test -- --browsers=ChromeHeadless --watch=false
      # - name: Run e2e tests
      #   run: ng e2e

  deploy-dev:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Vérifier la connexion Dockers
        run: |
          sudo systemctl is-active --quiet docker || sudo systemctl start docker
          sudo docker info
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Build
        run: sudo docker build -t jobmounchili/todo-app-frontend:latest .
      - name: Docker Push
        run: sudo docker push jobmounchili/todo-app-frontend:latest

  deploy-prod:
    runs-on: self-hosted
    needs: deploy-dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
