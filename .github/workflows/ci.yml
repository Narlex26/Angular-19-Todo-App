name: angular-ci

on:
  push:
    branches:
      - develop
      - staging
      - main
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.1'
      - name: Install dependencies
        run: npm install
      - name: Install Angular CLI
        run: npm install -g @angular/cli
      - name: Build application
        run: ng build
  
  notify-discord-build:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content":"✅ le build du front-end a réussi sur la branche `main` !"}' \
          ${{ secrets.URL_WEBHOOK }}

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.1'
      - name: Install Angular CLI
        run: npm install -g @angular/cli
      - name: Install dependency Cypress for E2E testing
        run: npm install cypress --save-dev
      - name: Run E2E tests
        run: npm run cypress:e2e:headless
    
  notify-discord-test:
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content":"✅ les tests ont réussi sur la branche `main` !"}' \
          ${{ secrets.URL_WEBHOOK }}

  deploy-staging:
    if: github.ref_name == 'staging'
    runs-on: self-hosted
    environment: ${{ github.ref_name == 'staging' }}
    needs: test
    steps:
      - name: 🔍 Debug BUILD_ENV
        run: |
          echo "BUILD_ENV=${{ github.environment }}"
          echo "BUILD_ENV=${{ github.ref }}"
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: staging
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create .env for Compose
        run: echo "BUILD_ENV=staging" > .env
      - name: Docker build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: jobmounchili/todo-app-frontend:staging
          build-args: |
            BUILD_ENV=staging
      - name: Docker Compose Up
        run: docker compose up -d
  
  notify-discord-deploy-staging:
    needs: deploy-prod
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content":"✅ Le deploy en staging a réussi sur la branche `main` !"}' \
          ${{ secrets.URL_WEBHOOK }}


  deploy-prod:
    if: github.ref_name == 'main'
    runs-on: self-hosted
    environment: ${{ github.ref_name == 'main' }}
    needs: deploy-staging
    steps:
      - name: 🔍 Debug BUILD_ENV
        run: |
          echo "BUILD_ENV=${{ github.environment }}"
          echo "BUILD_ENV=${{ github.ref }}"
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create .env for Compose
        run: echo "BUILD_ENV=production" > .env
      - name: Docker build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: jobmounchili/todo-app-frontend:production
          build-args: |
            BUILD_ENV=production
      - name: Docker Compose Up
        run: docker compose up -d
  
  notify-discord-deploy-main:
    needs: deploy-prod
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content":"✅ La pipeline CI/CD a réussi sur la branche `main` !"}' \
          ${{ secrets.URL_WEBHOOK }}
