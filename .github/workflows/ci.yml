name: angular-ci

on:
  push:
    branches:
      - develop
      - staging
      - main
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.1'
      - name: Install dependencies
        run: npm install
      - name: Install Angular CLI
        run: npm install -g @angular/cli
      - name: Build application
        run: ng build

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.1'
      - name: Install Angular CLI
        run: npm install -g @angular/cli
      - name: Install dependency Cypress for E2E testing
        run: npm install cypress --save-dev
      - name: Run E2E tests
        run: npm run cypress:e2e:headless
        # uses: cypress-io/github-action@v5
        # with:
        #   start: npm start
        #   wait-on: 'http://localhost:4200'
        #   wait-on-timeout: 300 # time in seconds (increase if needed)

  deploy-staging:
    if: github.ref_name == 'staging' || github.ref_name == 'main'
    runs-on: self-hosted
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name == 'staging' }}
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: staging
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: jobmounchili/todo-app-frontend:develop
          build-args: |
            BUILD_ENV= ${{ inputs.environment }}
      - name: Docker Compose Up
        run: docker compose up -d


  deploy-prod:
    if: github.ref_name == 'staging' || github.ref_name == 'main'
    runs-on: self-hosted
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name == 'staging' && 'staging' }}
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: jobmounchili/todo-app-frontend:prod
          build-args: |
            BUILD_ENV= ${{ inputs.environment }}
      - name: Docker Compose Up
        run: docker compose up -d
